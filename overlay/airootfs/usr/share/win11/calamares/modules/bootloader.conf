# Bootloader configuration
---
# Use GRUB for EFI installs
# Options: grub, sb-shim, systemd-boot

bootloader: "grub"
efiBootLoader: "grub"

# GRUB binaries
grubInstall: "grub-install"
grubMkconfig: "grub-mkconfig"
grubCfg: "/boot/grub/grub.cfg"
grubProbe: "grub-probe"
efiBootMgr: "efibootmgr"

# Avoid touching the EFI fallback loader unless explicitly needed
installEFIFallback: false
