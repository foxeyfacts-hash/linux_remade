name: Build ISO

on:
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --privileged
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare pacman keyring
        run: |
          pacman -Sy --noconfirm archlinux-keyring
          pacman-key --init
          pacman-key --populate archlinux
          pacman -Syu --noconfirm

      - name: Enable EndeavourOS repository
        run: |
          pacman -S --noconfirm curl
          curl -fsSL https://raw.githubusercontent.com/endeavouros-team/PKGBUILDS/master/endeavouros-mirrorlist/endeavouros-mirrorlist -o /etc/pacman.d/endeavouros-mirrorlist
          if ! grep -q '^\[endeavouros\]' /etc/pacman.conf; then
            printf "\n[endeavouros]\nSigLevel = Optional TrustAll\nInclude = /etc/pacman.d/endeavouros-mirrorlist\n" >> /etc/pacman.conf
          fi
          pacman -Sy --noconfirm endeavouros-keyring endeavouros-mirrorlist

      - name: Install build deps
        run: |
          pacman -S --noconfirm archiso git rsync squashfs-tools sudo base-devel wget imagemagick

      - name: Build ISO
        run: |
          chmod +x scripts/*.sh
          ./scripts/build-iso-ci.sh

      - name: Split ISO for upload (GitHub 2GB limit)
        run: |
          ISO_PATH=$(ls out/*.iso 2>/dev/null | head -n1 || true)
          if [ -z "$ISO_PATH" ]; then
            ISO_PATH=$(ls EndeavourOS-ISO/out/*.iso 2>/dev/null | head -n1 || true)
          fi
          if [ -z "$ISO_PATH" ]; then
            echo "ISO not found"
            exit 1
          fi
          sha256sum "$ISO_PATH" > "$ISO_PATH.sha256"
          # split into ~1.9GB parts to fit GitHub asset limits
          split -b 1900m -d -a 2 "$ISO_PATH" "$ISO_PATH.part"

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: win11craft-iso-parts
          path: |
            out/*.iso.part*
            out/*.iso.sha256
            EndeavourOS-ISO/out/*.iso.part*
            EndeavourOS-ISO/out/*.iso.sha256

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "win11craft-${{ github.run_number }}"
          name: "Win11Craft build ${{ github.run_number }}"
          prerelease: true
          generate_release_notes: true
          files: |
            out/*.iso.part*
            out/*.iso.sha256
            EndeavourOS-ISO/out/*.iso.part*
            EndeavourOS-ISO/out/*.iso.sha256
