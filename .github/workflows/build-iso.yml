name: Build ISO

on:
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --privileged
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare pacman keyring
        run: |
          pacman -Sy --noconfirm archlinux-keyring
          pacman-key --init
          pacman-key --populate archlinux
          pacman -Syu --noconfirm

      - name: Enable EndeavourOS repository
        run: |
          pacman -S --noconfirm curl
          curl -fsSL https://raw.githubusercontent.com/endeavouros-team/PKGBUILDS/master/endeavouros-mirrorlist/endeavouros-mirrorlist -o /etc/pacman.d/endeavouros-mirrorlist
          if ! grep -q "^\[endeavouros\]" /etc/pacman.conf; then
            cat >> /etc/pacman.conf <<'EOF'
[endeavouros]
SigLevel = Optional TrustAll
Include = /etc/pacman.d/endeavouros-mirrorlist
EOF
          fi
          pacman -Sy --noconfirm endeavouros-keyring endeavouros-mirrorlist

      - name: Install build deps
        run: |
          pacman -S --noconfirm archiso git rsync squashfs-tools sudo base-devel wget imagemagick

      - name: Build ISO
        run: |
          chmod +x scripts/*.sh
          ./scripts/build-iso-ci.sh

      - name: Upload ISO
        uses: actions/upload-artifact@v4
        with:
          name: win11craft-iso
          path: EndeavourOS-ISO/out/*.iso

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "win11craft-${{ github.run_number }}"
          name: "Win11Craft build ${{ github.run_number }}"
          prerelease: true
          generate_release_notes: true
          files: EndeavourOS-ISO/out/*.iso
